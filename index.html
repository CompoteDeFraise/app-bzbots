<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BZBots - Suite Enterprise AI</title>
    
    <!-- Bibliothèques externes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- LIEN GITHUB : Assurez-vous que ce lien pointe vers votre fichier translations.js public -->
    <script src="https://cdn.jsdelivr.net/gh/CompoteDeFraise/app-bzbots@main/translations.js"></script>
    
    <style>
        :root { --bz-black: #050505; --bz-light-text: #e5e5e5; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bz-black); 
            color: var(--bz-light-text); 
            overflow-x: hidden; 
            margin: 0; 
            min-height: 100vh; 
        }
        .ambient-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; background: #050505; }
        .ambient-blob-1 { position: absolute; top: -20%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; filter: blur(80px); }
        .ambient-blob-2 { position: absolute; bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(147,51,234,0.15) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; filter: blur(100px); }
        
        .view-section { display: none; animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .view-section.active { display: flex; flex-direction: column; height: 100vh; width: 100%; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }
        
        .glass-panel { 
            background: rgba(20, 20, 20, 0.4); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); 
        }
        
        .input-bz { 
            background-color: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            transition: all 0.3s ease; 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
        }
        .input-bz:focus { border-color: rgba(255, 255, 255, 0.4); background-color: rgba(255, 255, 255, 0.05); outline: none; }
        
        .btn-bz-primary { 
            background: rgba(255, 255, 255, 0.95); 
            color: #000; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: all 0.3s; 
            padding: 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            display: block; 
            text-align: center;
        }
        .btn-bz-primary:hover { 
            background: rgba(20, 20, 20, 0.6); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.5); 
            transform: translateY(-2px); 
        }
        
        .top-actions { position: absolute; top: 1rem; right: 1rem; display: flex; gap: 0.5rem; z-index: 50; }
        
        .lang-selector { 
            appearance: none; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #e5e5e5; 
            border-radius: 999px; 
            padding: 6px 30px 6px 12px; 
            font-size: 11px; 
            font-weight: 800; 
            cursor: pointer; 
            outline: none; 
            transition: 0.3s; 
        }
        .lang-selector:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="ambient-blob-1"></div>
        <div class="ambient-blob-2"></div>
    </div>

    <!-- VUE 1 : CONNEXION -->
    <section id="view-login" class="view-section active justify-center items-center p-4 relative">
        <div class="top-actions">
            <div class="relative">
                <select onchange="changeLanguage(this.value)" class="lang-selector">
                    <!-- Les options seront générées par le script -->
                </select>
                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-[8px] opacity-50"></i>
            </div>
        </div>
        
        <div class="glass-panel max-w-md w-full p-8 md:p-12 rounded-3xl space-y-10 relative overflow-hidden">
            <div class="flex flex-col items-center">
                <svg width="100" height="100" viewBox="0 0 100 100" fill="none" class="mb-6">
                    <text x="50" y="52" text-anchor="middle" font-weight="900" font-size="48" fill="white">BZ</text>
                    <rect x="15" y="58" width="70" height="4" fill="white"/>
                </svg>
                <h2 class="text-xs font-black tracking-[0.4em] text-gray-400 uppercase" data-i18n="loginTitle">Connexion</h2>
            </div>
            
            <form onsubmit="event.preventDefault(); handleLogin();" class="space-y-6">
                <div>
                    <label class="block text-[0.65rem] font-bold text-gray-400 uppercase mb-2 tracking-widest" data-i18n="accountName">Compte</label>
                    <input type="text" class="input-bz" value="Opérateur">
                </div>
                <div>
                    <label class="block text-[0.65rem] font-bold text-gray-400 uppercase mb-2 tracking-widest" data-i18n="password">Mot de passe</label>
                    <input type="password" class="input-bz" value="123456">
                </div>
                <button type="submit" id="loginBtn" class="btn-bz-primary">
                    <span data-i18n="loginBtn">ME CONNECTER</span>
                </button>
            </form>
        </div>
    </section>

    <!-- VUE 2 : ACCUEIL -->
    <section id="view-home" class="view-section">
        <header class="p-4 md:p-6 flex justify-between items-center border-b border-white/10 bg-black/40 backdrop-blur-xl">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-white text-black font-black flex items-center justify-center rounded-full text-xs" id="userAvatar">T</div>
                <span class="font-black text-white" id="userNameDisplay">Tanguy</span>
            </div>
            <div class="relative">
                <select onchange="changeLanguage(this.value)" class="lang-selector">
                    <!-- Les options seront générées par le script -->
                </select>
                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-[8px] opacity-50"></i>
            </div>
        </header>
        
        <div class="flex-1 p-6 flex flex-col items-center justify-center text-center">
             <h1 class="text-4xl font-black mb-4 uppercase tracking-tighter" data-i18n="hello">Bienvenue</h1>
             <p class="text-gray-400 max-w-md" data-i18n="bzLightDesc">Interface de contrôle des systèmes BZBots.</p>
             <button onclick="nav('view-login')" class="mt-8 text-xs font-bold uppercase tracking-widest text-gray-500 hover:text-white transition-colors">Déconnexion</button>
        </div>
    </section>

    <script>
        // --- CONFIGURATION INITIALE ---
        let currentLang = 'fr';

        /**
         * Initialise dynamiquement les menus déroulants à partir de l'objet 'translations'
         * chargé depuis le fichier externe translations.js
         */
        function initLanguageSelectors() {
            // Vérifie si la variable 'translations' existe (venant du fichier GitHub)
            if (typeof translations === 'undefined') {
                console.error("Erreur : Le fichier translations.js n'a pas pu être chargé depuis GitHub.");
                // Fallback minimal pour éviter le crash
                window.translations = { fr: { loginBtn: "ME CONNECTER" }, en: { loginBtn: "LOGIN" } };
            }

            const availableLangs = Object.keys(translations);
            const selectors = document.querySelectorAll('.lang-selector');

            selectors.forEach(select => {
                select.innerHTML = ''; // Nettoyage
                availableLangs.forEach(langCode => {
                    const option = document.createElement('option');
                    option.value = langCode;
                    option.textContent = langCode.toUpperCase();
                    option.className = "bg-[#111]";
                    if (langCode === currentLang) option.selected = true;
                    select.appendChild(option);
                });
            });

            updateInterfaceLanguage();
        }

        /**
         * Change la langue de l'application
         */
        function changeLanguage(lang) {
            currentLang = lang;
            // Synchronise tous les sélecteurs
            document.querySelectorAll('.lang-selector').forEach(sel => sel.value = lang);
            updateInterfaceLanguage();
        }

        /**
         * Applique les traductions aux éléments data-i18n
         */
        function updateInterfaceLanguage() {
            if (typeof translations === 'undefined' || !translations[currentLang]) return;

            const texts = translations[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (texts[key]) el.innerText = texts[key];
            });
        }

        /**
         * Navigation entre les vues
         */
        function nav(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        /**
         * Simulation de la connexion
         */
        function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.innerText = "...";
            setTimeout(() => { 
                nav('view-home');
                btn.innerHTML = originalText;
            }, 800);
        }

        // Lancement au chargement de la fenêtre
        window.onload = () => {
            // On laisse un petit délai pour être sûr que le script externe est bien interprété
            setTimeout(initLanguageSelectors, 500);
        };
    </script>
</body>
</html>
